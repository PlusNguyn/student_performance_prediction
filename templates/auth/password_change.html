{% extends "base/layout.html" %}

{% block content %}
  <section class="content-band content-narrow">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Security</p>
        <h2>Change password</h2>
      </div>
    </div>
    <form method="post" class="panel" novalidate>
      {% csrf_token %}
      {% include "components/form_errors.html" %}
      {% for field in form %}
        {% include "components/form_field.html" with field=field %}
      {% endfor %}
      <button class="btn btn-primary" type="submit"><i class="fa-solid fa-shield-halved"></i> Update password</button>
    </form>
  </section>
{% endblock %}
