{% extends "base/layout.html" %}

{% block content %}
  <section class="content-band">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Administration</p>
        <h2>{{ page_title }}</h2>
      </div>
      <a class="btn btn-outline-primary" href="{% url 'accounts:account_list' %}">
        <i class="fa-solid fa-arrow-left"></i> Users
      </a>
    </div>

    <form method="post" class="panel form-grid" novalidate>
      {% csrf_token %}
      {% include "components/form_errors.html" %}
      {% for field in form %}
        {% include "components/form_field.html" with field=field %}
      {% endfor %}
      <div class="form-span-2 d-flex justify-content-end gap-2">
        <a class="btn btn-light" href="{% url 'accounts:account_list' %}">Cancel</a>
        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk"></i> {{ submit_label }}</button>
      </div>
    </form>
  </section>
{% endblock %}
